name: CI & Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Backend Tests & Coverage
  # ─────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        working-directory: backend
        # ✅ Use test:cov which respects jest.config.js (not npm test --coverage)
        run: npm run test:cov

      - name: Print coverage summary
        working-directory: backend
        if: always()
        run: |
          if [ -f "coverage/lcov.info" ]; then
            echo "✅ lcov.info generated"
            TOTAL_LF=$(grep "^LF:" coverage/lcov.info | awk -F: '{sum+=$2} END {print sum}')
            TOTAL_LH=$(grep "^LH:" coverage/lcov.info | awk -F: '{sum+=$2} END {print sum}')
            echo "Lines Found: $TOTAL_LF"
            echo "Lines Hit:   $TOTAL_LH"
            if [ "$TOTAL_LF" -gt 0 ]; then
              PCT=$(awk "BEGIN {printf \"%.2f\", ($TOTAL_LH/$TOTAL_LF)*100}")
              echo "📊 Coverage: ${PCT}%"
            fi
          else
            echo "❌ No lcov.info file found"
            exit 1
          fi

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2 — Frontend Tests & Coverage
  # ─────────────────────────────────────────────
  test-frontend:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run tests with coverage
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false --ci

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3 — Security Scan
  # ─────────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run npm audit (backend)
        run: cd backend && npm audit --audit-level high || true

  # ─────────────────────────────────────────────
  # JOB 4 — SonarQube Analysis
  # Needs coverage artifacts from test jobs !!!
  # ─────────────────────────────────────────────
  sonarqube:
    name: 📊 SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # SonarQube needs full git history for blame info
          fetch-depth: 0

      # ✅ FIX CRITIQUE: Download coverage before scanning
      - name: Download backend coverage report
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

      - name: Download frontend coverage report
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
        # Don't fail if frontend has no tests yet
        continue-on-error: true

      - name: Verify coverage files before Sonar scan
        run: |
          echo "📁 Backend coverage:"
          ls -la backend/coverage/ || echo "⚠️ No backend coverage directory"
          if [ -f "backend/coverage/lcov.info" ]; then
            echo "✅ backend/coverage/lcov.info found"
            TOTAL_LF=$(grep "^LF:" backend/coverage/lcov.info | awk -F: '{sum+=$2} END {print sum}')
            TOTAL_LH=$(grep "^LH:" backend/coverage/lcov.info | awk -F: '{sum+=$2} END {print sum}')
            echo "Backend — Lines Found: $TOTAL_LF | Lines Hit: $TOTAL_LH"
          else
            echo "❌ backend/coverage/lcov.info NOT FOUND — SonarQube will show 0% coverage"
          fi

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v3
        with:
          projectBaseDir: backend
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ─────────────────────────────────────────────
  # JOB 5 — Deploy to Staging (develop branch)
  # ─────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy to Staging
    needs: [test-backend, test-frontend, security-scan, sonarqube]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Staging
        run: vercel --token=${{ secrets.SKILLHR }} --scope ${{ secrets.VERCEL_ORG_ID }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Health Check
        run: |
          sleep 30
          if ! curl -f https://staging.yourapp.com/health; then
            echo "❌ Staging health check failed"
            exit 1
          fi
          echo "✅ Staging deployment successful"

  # ─────────────────────────────────────────────
  # JOB 6 — Deploy to Production (main branch)
  # ─────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy to Production
    needs: [test-backend, test-frontend, security-scan, sonarqube]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Build via Vercel
        run: vercel build --prod --token=${{ secrets.SKILLHR }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.SKILLHR }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Health Check
        run: |
          sleep 30
          if ! curl -f https://yourapp.com/health; then
            echo "❌ Production health check failed, rolling back..."
            vercel rollback --token=${{ secrets.SKILLHR }}
            exit 1
          fi
          echo "✅ Production deployment successful"

  # ─────────────────────────────────────────────
  # JOB 7 — Notify
  # ─────────────────────────────────────────────
  notify:
    name: 📢 Notify Results
    needs: [test-backend, test-frontend, security-scan, sonarqube]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify on Success
        if: ${{ needs.test-backend.result == 'success' && needs.sonarqube.result == 'success' }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"✅ CI/CD Pipeline Successful for ${{ github.repository }} — Branch: ${{ github.ref_name }} — Commit: ${{ github.sha }}"}' \
            ${{ secrets.SLACK_WEBHOOK }} || echo "Slack notification skipped (no webhook configured)"

      - name: Notify on Failure
        if: ${{ needs.test-backend.result == 'failure' || needs.sonarqube.result == 'failure' }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ CI/CD Pipeline Failed for ${{ github.repository }} — Branch: ${{ github.ref_name }} — Commit: ${{ github.sha }}"}' \
            ${{ secrets.SLACK_WEBHOOK }} || echo "Slack notification skipped (no webhook configured)"
